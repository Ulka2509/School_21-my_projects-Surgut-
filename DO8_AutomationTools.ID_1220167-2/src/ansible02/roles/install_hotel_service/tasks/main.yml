---
- name: copy hotel service code
  copy:
    src: services/hotel-service/
    dest: /opt/hotel-service/
    owner: vagrant
    group: vagrant
    mode: "0755"

- name: install openjdk-11-jre-headless
  apt:
    name: openjdk-11-jre-headless
    state: present
    update_cache: yes

- name: install maven
  apt:
    name: maven
    state: present
    update_cache: yes

- name: download dependencies
  command: mvn dependency:go-offline
  args:
    chdir: /opt/hotel-service

- name: build the hotel service .jar file
  command: mvn package -DskipTests
  args:
    chdir: /opt/hotel-service

- name: hotel-service dir is writable
  file:
    path: /opt/hotel-service
    owner: vagrant
    group: vagrant
    recurse: true

- name: Create systemd service for hotel-service
  copy:
    content: |
      [Unit]
      Description=Hotel Service
      After=network.target

      [Service]
      Type=simple
      User=vagrant
      WorkingDirectory=/opt/hotel-service
      Environment=POSTGRES_HOST=192.168.56.13
      Environment=POSTGRES_PORT=5432
      Environment=POSTGRES_DB=hotels_db
      Environment=POSTGRES_USER=postgres
      Environment=POSTGRES_PASSWORD=postgres
      ExecStart=/usr/bin/java -jar target/hotel-service-0.0.1-SNAPSHOT.jar
      Restart=always
      SuccessExitStatus=143

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/hotel-service.service

- name: Reload systemd and start hotel-service
  systemd:
    name: hotel-service
    enabled: yes
    state: started
    daemon_reload: yes
